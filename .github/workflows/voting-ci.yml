# This file is for github workflow for CI/CD implementation with Github Action
name: voting-app CI
on:
  push:
    branches: ["master", "main"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: vote
        run: pip install -r requirements.txt

      - name: Run test
        working-directory: vote
        run: pytest

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        working-directory: vote
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:${{ github.run_id }}

      - name: Docker push
        working-directory: vote
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:${{ github.run_id }}

      - name: Update tag on k8s deployment yaml file
        run: |
          sed -i '/voting-container/{n;s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:${{ github.run_id }}|;}' deployment.yml

      - name: Commit and Push
        run: |
          git config --global user.name "${{ secrets.DOCKERHUB_USERNAME }}"
          git config --global user.email "rajijoy@rediffmail.com"
          git add deployment.yml
          git commit -m "Update tag on k8s deployment yaml file"
          git push
