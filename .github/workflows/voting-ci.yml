# This file is for github workflow for CI/CD implementation with Github Action
name: voting-app CI
on:
  push:
    branches: ["main"]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: vote
        run: pip install -r requirements.txt

      - name: Run test
        working-directory: vote
        run: pytest

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        uses: docker/build-push-action@v4
        with:
          context: vote
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:${{ github.sha }}

      - name: Update tag on k8s deployment yaml file
        run: |
          sed -i 's|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:${{ github.sha }}|g' k8s/deployment.yaml

      - name: Commit and Push
        run: |
          git config --global user.name '${{ secrets.DOCKERHUB_USERNAME }}
          git config --global user.email '${{ secrets.DOCKERHUB_EMAIL }}
          git add deployment.yaml
          git commit -m "Update tag on k8s deployment yaml file"
          git push
