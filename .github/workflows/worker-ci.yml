name: Worker Service CI/CD

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'worker/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore Dependencies
        working-directory: worker
        run: dotnet restore

      - name: Build Worker Application
        working-directory: worker
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        working-directory: worker
        run: dotnet test --no-build --verbosity normal
        continue-on-error: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:workerapp-${{ github.run_id }}
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:latest

      - name: Update Worker Deployment
        run: |
          sed -i "/name: worker-container/{n;s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/worker-application:${{ github.run_id }}|;}" k8s/worker-deployment.yml

      - name: Commit Updated Deployment
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add k8s/worker-deployment.yml

          git commit -m "Update Worker image to ${{ github.run_id }} [skip ci]" || echo "No changes to commit"

          git push
```
