
name: voting-app-ci

on:
  push:
    branches:
      - main
      - master

# This is going to prevent multiple workflow runs for the same branch. Same file will not be updated by multiple workflow runs at the same time. This is important because we are updating the deployment file in this workflow and if multiple workflow runs are trying to update the same file at the same time, it will create a conflict and the workflow will fail. So we are using concurrency to prevent that.

concurrency:
  group: deployment-manifest-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        working-directory: vote
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        working-directory: vote
        #run: pytest
        run: |
          pytest || [[ $? -eq 5 ]]

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:votingapp-${{ github.run_id }}

      - name: update deployment file
        run: |
          sed -i '/name: voting-container/{n;s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/voting-application:votingapp-${{ github.run_id }}|;}' deployment.yml

      - name: commit changes
        run: |
          git config user.name "${{ secrets.GIT_USERNAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add deployment.yml
          git commit -m "Update image tag [skip ci]" || exit 0
          
          # This will prevent an error of modifying same deployment file. GitHub rejects it because the remote branch now contains a newer commit.
        
          git pull --rebase origin master
          git push origin master
