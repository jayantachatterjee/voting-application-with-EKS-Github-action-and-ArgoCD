# This YAML file defines a GitHub Actions workflow for continuous integration (CI) on the repository. It is triggered on push request events to the main branch.

name: CI file for voting-app which is written in Python
on: 
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v2

      with:
        python-version: 3.8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python -m unittest discover -s tests  

    - name: Build Docker image
      uses: docker/build-push-action@v2
      with:
         context: .
         file: ./vote/Dockerfile
         push: true
         tags: voting-app:latest  