# This YAML file defines a GitHub Actions workflow for continuous integration (CI) on the repository. It is triggered on push request events to the main branch.

name: CI file for voting-app which is written in Python
on: 
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11-slim'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 1: Check out the source code containing your Dockerfile
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the Docker Buildx builder instance
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the Docker image locally on the runner
      - name: Build Local Image
        uses: docker/build-push-action@v6
        with:
          context: /vote
          file: ./Dockerfile
          tags: my-local-voting-image:latest