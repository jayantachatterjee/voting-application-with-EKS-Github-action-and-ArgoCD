# This YAML file defines a GitHub Actions workflow for continuous integration (CI) on the repository. It is triggered on push request events to the main branch.

name: CI file for voting-app which is written in Python
on: 
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11-slim'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/

  
  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Build Docker image
      with:
        context: /vote 
        dockerfile: ./Dockerfile
        tags: voting-app:latest